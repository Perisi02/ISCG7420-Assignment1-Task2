<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
        {% block title %}
        Piki Ora Medical Centre
        {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'appointment:home' %}">
            Piki Ora Medical Centre
        </a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'appointment:home' %}">Home</a>
            <a class="nav-link" href="{% url 'appointment:doctor_list' %}">Doctors</a>
            <a class="nav-link" href="{% url 'appointment:slot_list' %}">Available Slots</a>

            {% if user.is_authenticated %}
            <a class="nav-link" href="{% url 'appointment:my_appointments' %}">My Appointments</a>

            <span class="navbar-text text-white ms-3">
            Hi, {{ user.username }}
            </span>

            <form method="post" action="{% url 'logout' %}" class="d-inline ms-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">
                    Logout
                </button>
            </form>
            {% else %}
            <a class="nav-link" href="{% url 'login' %}">
                Login
            </a>
            {% endif %}
        </div>

    </div>
</nav>

<main class="container mt-4">

    {% if messages %}
    {% for message in messages %}
    <div class="alert
                {% if message.tags == 'error' %}
                    alert-danger
                {% elif message.tags == 'success' %}
                    alert-success
                {% else %}
                    alert-info
                {% endif %}
                alert-dismissible fade show" role="alert">

        {{ message }}

        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
